<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="qcool.css">
</head>
<body>

    <header class="heading">
        <h1>TEXT TO <span class="marker">QR CODE</span> GENERATOR</h1>
    </header>

    <main class="main-wrapper">
        <div class="container">
            <p>Enter Your Text or URL</p>
            <input type="text" placeholder="https://google.com" id="qrText">

            <div id="imgBox">
                <img src="" id="qrImage" alt="Generated QR Code">
            </div>

            <button onclick="genz()">Generate QR Code</button>
        </div>
    </main>

    <script>
        let imgBox = document.getElementById("imgBox");
        let qrImage = document.getElementById("qrImage");
        let qrText = document.getElementById("qrText");

        function genz() {
            if (qrText.value.trim().length > 0) {
                // Using trim() to avoid empty spaces
                qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(qrText.value);
                imgBox.classList.add("show-img");
            } else {
                qrText.classList.add('error');
                setTimeout(() => {
                    qrText.classList.remove('error');
                }, 500);
            }
        }
    </script>
</body>
</html>
